<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>实时贵金属报价</title>
<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}
body {
  font-family: "Microsoft Yahei", Arial, sans-serif;
  background: #fff;
}
.header {
  background: #c8102e;
  color: #fff;
  padding: 15px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.header .title {
  font-size: 22px;
  font-weight: bold;
}
.header .time {
  font-size: 14px;
}
.main-price {
  text-align: center;
  padding: 30px 20px;
}
.main-price .label {
  font-size: 24px;
  color: #333;
  margin-bottom: 10px;
}
.main-price .gold-price {
  font-size: 80px;
  font-weight: bold;
  color: #c8102e;
  line-height: 1;
}
.main-price .silver-price {
  font-size: 40px;
  font-weight: bold;
  color: #c8102e;
  line-height: 1.2;
  margin-top: 10px;
}
.main-price .unit {
  font-size: 24px;
  color: #333;
  margin-top: 8px;
}
.table-box {
  margin: 0 20px 20px;
  border: 1px solid #ccc;
}
table {
  width: 100%;
  border-collapse: collapse;
}
td {
  border: 1px solid #ccc;
  padding: 12px;
  text-align: center;
  font-size: 16px;
}
.item-name {
  color: #666;
  font-size: 18px;
}
.item-price {
  color: #c8102e;
  font-size: 24px;
  font-weight: bold;
}
.myr {
  color: #0066cc;
}
.cny {
  color: #e63946;
}
</style>
</head>
<body>
<div class="header">
  <div class="title">实时贵金属</div>
  <div class="time" id="current-time">2025-10-03 10:56:57 营业中</div>
</div>

<div class="main-price">
  <div class="label">今日金价</div>
  <div class="gold-price" id="gold-price">880.41</div>
  <div class="label">今日银价</div>
  <div class="silver-price" id="silver-price">13.54</div>
  <div class="unit">元/克</div>
</div>

<div class="table-box">
  <table>
    <tr>
      <td>
        <div class="item-name">黄金原料9999 买进</div>
        <div class="item-price myr" id="gold-raw-buy">0.00</div>
      </td>
      <td>
        <div class="item-name">黄金原料9999 卖出</div>
        <div class="item-price myr" id="gold-raw-sell">0.00</div>
      </td>
    </tr>
    <tr>
      <td>
        <div class="item-name">黄金首饰AU9999/AU999 买进</div>
        <div class="item-price myr" id="gold-jewelry-buy">0.00</div>
      </td>
      <td>
        <div class="item-name">黄金首饰AU9999/AU999 卖出</div>
        <div class="item-price myr" id="gold-jewelry-sell">0.00</div>
      </td>
    </tr>
    <tr>
      <td>
        <div class="item-name">白银原料9999 买进</div>
        <div class="item-price myr" id="silver-raw-buy">0.00</div>
      </td>
      <td>
        <div class="item-name">白银原料9999 卖出</div>
        <div class="item-price myr" id="silver-raw-sell">0.00</div>
      </td>
    </tr>
    <tr>
      <td>
        <div class="item-name">白银首饰AG9999/AG999 买进</div>
        <div class="item-price myr" id="silver-jewelry-buy">0.00</div>
      </td>
      <td>
        <div class="item-name">白银首饰AG9999/AG999 卖出</div>
        <div class="item-price myr" id="silver-jewelry-sell">0.00</div>
      </td>
    </tr>
    <tr>
      <td>
        <div class="item-name">中国投资金 买进</div>
        <div class="item-price cny" id="china-invest-gold">0.00</div>
      </td>
      <td>
        <div class="item-name">黄金回收</div>
        <div class="item-price cny" id="gold-recycle">848.91</div>
      </td>
    </tr>
  </table>
</div>

<script>
// ====================== 你可以自己修改的参数 ======================
const CONFIG = {
  // 点差：卖出价 - 买入价（单位：马币/克）
  goldSpread:        2.00,   // 黄金原料点差
  goldJewelrySpread: 3.50,   // 黄金首饰点差
  silverSpread:      0.20,   // 白银原料点差
  silverJewelrySpread: 0.30, // 白银首饰点差

  // 首饰溢价（在原料价基础上加价）
  goldJewelryPremium:  8.00, // 黄金首饰溢价 MYR/g
  silverJewelryPremium: 1.00, // 白银首饰溢价 MYR/g
}
// =================================================================

function updateTime() {
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth()+1).padStart(2, '0');
  const d = String(now.getDate()).padStart(2, '0');
  const h = String(now.getHours()).padStart(2, '0');
  const min = String(now.getMinutes()).padStart(2, '0');
  const s = String(now.getSeconds()).padStart(2, '0');
  document.getElementById('current-time').textContent = 
    `${y}-${m}-${d} ${h}:${min}:${s} 营业中`;
}

async function loadPrice() {
  try {
    // 模拟实时数据（后续可替换为真实API）
    const mockData = {
      goldUSD: 2800,     // 伦敦金 美元/盎司
      usdMyr: 4.70,      // 美元兑马币
      usdCny: 7.20,      // 美元兑人民币
      silverUSD: 25      // 伦敦银 美元/盎司
    }

    const oz = 31.1035
    const goldMyrPerG = mockData.goldUSD * mockData.usdMyr / oz
    const goldCnyPerG = mockData.goldUSD * mockData.usdCny / oz
    const silverMyrPerG = mockData.silverUSD * mockData.usdMyr / oz
    const silverCnyPerG = mockData.silverUSD * mockData.usdCny / oz

    // 更新顶部今日金价/银价（人民币显示）
    document.getElementById('gold-price').textContent = goldCnyPerG.toFixed(2)
    document.getElementById('silver-price').textContent = silverCnyPerG.toFixed(2)

    // 黄金原料
    document.getElementById('gold-raw-buy').textContent = 
      (goldMyrPerG - CONFIG.goldSpread/2).toFixed(2)
    document.getElementById('gold-raw-sell').textContent = 
      (goldMyrPerG + CONFIG.goldSpread/2).toFixed(2)

    // 黄金首饰
    document.getElementById('gold-jewelry-buy').textContent = 
      (goldMyrPerG + CONFIG.goldJewelryPremium - CONFIG.goldJewelrySpread/2).toFixed(2)
    document.getElementById('gold-jewelry-sell').textContent = 
      (goldMyrPerG + CONFIG.goldJewelryPremium + CONFIG.goldJewelrySpread/2).toFixed(2)

    // 白银原料
    document.getElementById('silver-raw-buy').textContent = 
      (silverMyrPerG - CONFIG.silverSpread/2).toFixed(2)
    document.getElementById('silver-raw-sell').textContent = 
      (silverMyrPerG + CONFIG.silverSpread/2).toFixed(2)

    // 白银首饰
    document.getElementById('silver-jewelry-buy').textContent = 
      (silverMyrPerG + CONFIG.silverJewelryPremium - CONFIG.silverJewelrySpread/2).toFixed(2)
    document.getElementById('silver-jewelry-sell').textContent = 
      (silverMyrPerG + CONFIG.silverJewelryPremium + CONFIG.silverJewelrySpread/2).toFixed(2)

    // 中国投资金
    document.getElementById('china-invest-gold').textContent = 
      goldCnyPerG.toFixed(2)
  } catch(e){
    console.error(e)
  }
}

updateTime()
setInterval(updateTime, 1000)
loadPrice()
</script>
</body>
</html>
